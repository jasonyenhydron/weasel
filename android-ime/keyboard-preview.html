<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>小企鵝嘸蝦米鍵盤預覽</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1f2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    padding: 20px 0 40px;
    gap: 32px;
  }

  h2 {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── 手機外框 ── */
  .phone {
    width: 390px;
    background: #0f1117;
    border-radius: 40px;
    border: 2px solid #2d3348;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .phone-screen {
    background: #1c1f2a;
    padding: 14px 16px 0;
    min-height: 100px;
  }

  .app-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid #2a2e3e;
  }

  .app-icon {
    width: 28px; height: 28px;
    background: #2563eb;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: bold;
  }

  .app-title { color: #e2e8f0; font-size: 14px; }
  .app-sub   { color: #64748b; font-size: 12px; margin-left: auto; }

  .text-area {
    color: #94a3b8;
    font-size: 13px;
    padding: 10px 0 14px;
    line-height: 1.6;
  }

  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: #34d399;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── 鍵盤本體 ── */
  .keyboard {
    background: #17191f;
    padding: 6px 6px 4px;
    width: 100%;
  }

  /* 工具列 */
  .toolbar {
    display: flex;
    align-items: center;
    height: 40px;
    gap: 0;
    margin-bottom: 0;
  }

  .tool-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #252830;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin-right: 6px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .tool-btn:hover { background: #2e3340; }
  .tool-btn svg { width: 15px; height: 15px; }
  .tool-btn img { width: 15px; height: 15px; }

  .hint {
    flex: 1;
    text-align: right;
    color: #9aa1b2;
    font-size: 11px;
    padding-right: 2px;
  }

  /* 組字 / 候選 */
  .composing-area {
    min-height: 14px;
    color: #b4bdd3;
    font-size: 12px;
    padding: 2px 0 0;
  }
  .candidate-text {
    color: #8ed3ff;
    font-size: 13px;
    font-weight: bold;
    padding-top: 1px;
    min-height: 16px;
  }
  .candidate-row {
    display: flex;
    height: 34px;
    align-items: center;
    gap: 4px;
    overflow: hidden;
  }
  .cand-btn {
    background: #252830;
    color: #f1f5f9;
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    height: 28px;
    line-height: 1;
  }
  .cand-btn:first-child { color: #34d399; background: #1e3a2f; }

  /* 按鍵共用 */
  .row {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .row.center { justify-content: center; }

  .key {
    flex: 1;
    height: 44px;
    background: #2a2d38;
    color: #f2f4fa;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
    box-shadow: 0 2px 0 #1a1c22;
    position: relative;
    user-select: none;
  }
  .key:active { background: #3a3e4e; transform: translateY(1px); box-shadow: none; }

  /* 特殊字根列 */
  .key.special {
    background: #222430;
    color: #cbd5e1;
    font-size: 14px;
    height: 38px;
    box-shadow: 0 1px 0 #14151a;
  }

  /* 功能鍵 */
  .key.func {
    background: #1e2028;
    color: #f2f4fa;
    font-size: 13px;
  }

  /* Space */
  .key.space {
    flex: 4.4;
    background: #2a2d38;
    color: #9aa1b2;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* Enter */
  .key.enter {
    flex: 1.2;
    color: #8ed3ff;
    font-size: 18px;
  }

  /* Backspace */
  .key.bs { flex: 1.4; }

  /* Shift (hidden in XM mode – shown here for completeness) */
  .key.shift { flex: 1.4; display: none; }

  /* Globe */
  .key.globe { flex: 0.9; font-size: 16px; }

  /* comma/period */
  .key.punct { flex: 0.8; color: #cbd5e1; }

  /* Number row */
  .key.num { font-size: 14px; }

  /* ASDF offset spaces */
  .spacer { flex: 0.6; }

  /* Accent highlight on press demo */
  .key.demo-active { background: #34d399; color: #0f1117; }

  /* ── 深色 / 淺色 / 抹茶 切換預覽 ── */
  .theme-light .keyboard  { background: #edf0f4; }
  .theme-light .key       { background: #ffffff; color: #1f2937; box-shadow: 0 2px 0 #c8cdd6; }
  .theme-light .key.func  { background: #dde1ea; }
  .theme-light .key.space { background: #ffffff; color: #4b5563; }
  .theme-light .key.special { background: #e8ecf3; color: #374151; }
  .theme-light .composing-area { color: #374151; }
  .theme-light .candidate-text { color: #2563eb; }
  .theme-light .cand-btn  { background: #e2e8f0; color: #1f2937; }
  .theme-light .cand-btn:first-child { background: #dbeafe; color: #1d4ed8; }
  .theme-light .toolbar   { /* same layout */ }
  .theme-light .tool-btn  { background: #dde1ea; }

  .theme-matcha .keyboard  { background: #10231d; }
  .theme-matcha .key       { background: #1a3329; color: #e7f9ee; box-shadow: 0 2px 0 #0a1410; }
  .theme-matcha .key.func  { background: #122519; }
  .theme-matcha .key.space { background: #1a3329; color: #6ee7b7; }
  .theme-matcha .key.special { background: #152b21; color: #86efac; }
  .theme-matcha .candidate-text { color: #34d399; }
  .theme-matcha .cand-btn  { background: #1a3329; color: #e7f9ee; }
  .theme-matcha .cand-btn:first-child { background: #064e3b; color: #34d399; }
  .theme-matcha .tool-btn  { background: #1a3329; }

  /* ── 三主題並列標題 ── */
  .themes-wrapper {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .theme-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .theme-label {
    color: #64748b;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>

  <div class="theme-block">

    <div class="phone theme-matcha">

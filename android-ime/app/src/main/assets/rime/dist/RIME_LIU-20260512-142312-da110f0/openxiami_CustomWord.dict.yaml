身體方面（與身體感受、放鬆和感官觸覺有關） 1. 當你放鬆時，是否能夠感覺到身體的某些部位逐漸變得輕鬆或沉重？ A) 是的，我可以感覺到 B) 有時能夠感覺到 C) 很少感覺到 D) 我完全無法感覺到 2. 當你專注於某個地方時，是否能夠感覺到身體的其他部位放鬆或變暖？ A) 是的，我可以感覺到身體變暖或放鬆 B) 偶爾能感覺到 C) 我不確定 D) 我完全無法感覺到 3. 在深度放鬆的狀態下，是否能夠覺察到自己的呼吸變慢或更深？ A) 是的，我能夠非常明顯地感覺到 B) 偶爾可以感覺到 C) 有時會注意到 D) 我無法注意到這一點 4. 當你閉上眼睛時，是否能夠感覺到周圍環境的變化，比如溫度或氣流的不同？ A) 是的，我可以明顯感覺到 B) 有時能夠注意到 C) 不太能感覺到 D) 我完全無法感覺到 5. 當你處於放鬆狀態時，你是否能感覺到身體的某些部位產生微妙的震動或脈動？ A) 是的，我能清楚感覺到 B) 偶爾會注意到 C) 很少能感覺到 D) 我從未有過這樣的感覺 --- 心理方面（與集中、思維控制、感官感知有關） 1. 當你專心聽一首音樂時，你是否會完全投入其中，忽略其他聲音？ A) 是的，我能完全專注 B) 有時能做到 C) 我有點分心 D) 我很難集中注意力 2. 如果有人給你建議，你是否能很容易地想像並理解這些建議的具體內容？ A) 是的，我能很快理解並想像出來 B) 我需要一些時間來理解 C) 有時理解不了 D) 我很難理解這些建議 3. 當你聽到安靜的聲音或自然的背景音效時，是否會讓你感到放鬆或愉悅？ A) 是的，這會讓我完全放鬆 B) 有時會感覺放鬆 C) 我不太感覺放鬆 D) 我完全不會感到放鬆 4. 你是否能想像某個場景的香氣，比如新鮮的花香或海風的味道？ A) 是的，我可以非常清晰地想像 B) 偶爾能想像，但不太清楚 C) 很難想像 D) 我無法想像這些氣味 5. 當你專注於某個想法時，是否會感覺到其他思緒被自動排除，讓你變得非常集中？ A) 是的，我可以完全排除其他思緒 B) 有時能做到 C) 很難做到 D) 我無法做到 --- 靈性方面（與意識、心靈感受、深度感知有關） 1. 當你在安靜的環境中閉上眼睛時，是否能夠感覺到與某種內在力量或深層意識連接？ A) 是的，我能夠深刻感覺到 B) 偶爾會有這種感覺 C) 很少有這種感覺 D) 我從未有過這種感覺 2. 你是否能在冥想或深度放鬆中，感覺到自己的心境變得清澈，似乎沒有任何干擾的念頭？ A) 是的，我能完全放空思想 B) 偶爾能達到這種狀態 C) 我很難達到這種狀態 D) 我從未達到過這樣的狀態 3. 你是否相信自己的思維可以影響身邊的環境，無論是心情還是周圍的能量？ A) 是的，我完全相信 B) 我覺得有些可能性 C) 我不確定 D) 我不相信 4. 你是否能感覺到某些精神體驗，像是直覺或心靈感應的經歷？ A) 是的，我經常有這樣的經歷 B) 偶爾會有 C) 很少有 D) 我從未有過這種經歷 5. 當你試著清空思想時，是否能夠感覺到自己進入一種超越自我的狀態，像是與宇宙的能量相通？ A) 是的，我能完全進入這種狀態 B) 有時能進入，但不完全 C) 很難達到這種狀態 D) 我無法進入這種狀態 催眠深度評分方式： 選項：A、3分，B、2分，C、1分，D、0分 總分： 0-10分：感官感受性極低，催眠進入深度困難。 11-20分：感官感受性較低，可嘗試輕度催眠。 21-30分：感官感受性中等，能進入中度催眠。 31-45分：感官感受性高，催眠狀態可達深度層次，並能完全沉浸於想像世界。	sprp

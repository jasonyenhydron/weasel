遠距催眠調教需有：   1、準備：  ①座位：有靠背的椅子或床可以全身放鬆  ②姿勢：可以看到臉部及大腿才能了解放鬆狀態。 ③軟體：請使用line或skype，如果用微信需要vpn連線才不會斷線。    2、設備：  ①視訊：手機請用手機立架固定或使用筆電。  ②耳機：使用藍芽耳機並充滿電。  ③手機：切靜音勿擾模式並充滿80％以上電。   3、時間：  ①平常日晚上8點至9點半會比較方便。  ②調教時間約30-50分左右完全私人的時間，請告訴家人不要打擾。 ③當天五點至六點左右跟主人確定時間怕太臨時在忙。   4、可以大概描述你想要的感覺或情境（羞辱、捆綁、犬化…），或是完全交給主人引導你。    ※請事先跟主人約好時間	a3
實際催眠調教方式：催眠使用漸進式放鬆法，專注在身體的完全放鬆後，暗示進入內心潛意識的情境：  1、捆綁控射：蒙眼玩屌，踩屌、撫摸、挑逗，跳蛋，；主人允許才能射精 https://pse.is/EHT2A  2、 輕虐調教：低週波電擊、按摩、夾乳頭，, 皮鞭打屁屁，馬眼棒，催眠做愛高潮 https://youtu.be/ziEiWoEHUjI  3、狗奴調教：當狗狗玩,載項圈，口球，踩屌,舔腳，撒尿，淋尿， 剃恥毛, 催眠成狗狗：https://youtu.be/PPsec1SEVOw https://goo.gl/zt3QPJ  4、體驗意識和身體的分離，催眠至感覺身體是物品堅硬，玩弄時沒有感覺，再玩屌、撫摸、高潮 催眠成木頭：http://m.iqiyi.com/w_19rvm85ve5.html 使用的道具：https://goo.gl/zEC2f8 可以依奴性選擇…	a4
遠距催眠調教需有：   1、準備：  ①坐在有靠背的椅子或床可以看到面臉及上半身含手臂才能知道放鬆狀態。  ②放鬆居家不要配帶飾品眼鏡，依舒適為主。 ③使用微信要用vpn連線    2、設備：  ①手機用立架固定或使用筆電。  ②耳機盡量使用藍芽耳機並充滿電。  ③手機切靜音勿擾模式接行動電源。   3、催眠調教前可以大概描述你想要的感覺或情境，如果有可以準備自己的情趣玩具…或是完全交給主人引導你	a5

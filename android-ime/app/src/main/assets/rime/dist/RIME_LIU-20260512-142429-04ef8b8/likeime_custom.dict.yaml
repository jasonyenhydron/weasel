以下是10題的計分方式 🧠 想像力與感受力評估問卷（共10題）  題號題目簡述選項分數（建議）1情感反應強度A. 常常會流淚 → 3分 B. 偶爾有感觸 → 2分 C. 幾乎不會反應 → 1分2回憶情感強度A. 歷歷在目 → 3分 B. 模糊記得 → 2分 C. 幾乎記不起 → 1分3入睡速度A. 10分鐘 → 3分 B. 半小時 → 2分 C. 1小時以上 → 1分4酸檸檬想像反應A. 流口水明顯酸 → 3分 B. 微酸 → 2分 C. 無感覺 → 1分5水果畫面變化A. 畫面清晰 → 3分 B. 模糊可見 → 2分 C. 看不到畫面 → 1分6冥想/白日夢喜好A. 經常進行 → 3分 B. 偶爾進行 → 2分 C. 不喜歡 → 1分7沙灘情境反應A. 有聲有感 → 3分 B. 有一點感覺 → 2分 C. 沒有感覺 → 1分8鏡中陌生感A. 常常有 → 3分 B. 偶爾有 → 2分 C. 沒有 → 1分9雙手高度差實驗A. 差距明顯 → 3分 B. 差距中等 → 2分 C. 幾乎無差距 → 1分10描述想像空間A. 清晰具體 → 3分 B. 模糊可描述 → 2分 C. 描述困難 → 1分   ✅ 總分說明（滿分30分）  得分區間解釋25–30分🌀極高敏感度型：想像力強、情感深、非常適合進行催眠引導、潛意識探索18–24分🌊中度感受型：可視覺化想像，有部分身體感應，適合溫和式引導訓練10–17分🧱低敏實際型：情感與想像力較弱，建議以邏輯式、行為式訓練為主   📌 補充建議：  可搭配「催眠暗示反應測試」進行第二階段深度評估。  可視覺化成雷達圖 / 熱感圖以輔助分析（若需，我可幫您製作）。  🧠 小口訣記憶法：  三分代表心靈開， 二分模糊慢慢來。 一分尚需多練習， 冥想催眠更自在。	jtjf

1. 筆觸  手繪感強烈，保留筆刷與鉛筆質感  線條柔和、適度鬆散，避免過度銳利  著重表達「溫度感」，不追求寫實細節   2. 色彩配色  偏自然色調：使用柔和的紅、藍、綠、米色等自然色  空氣感配色：大量使用低飽和、高明度色彩，營造輕盈通透感  主題配色一致：根據場景情緒使用統一色調（如：憂傷＝藍灰／懷舊＝橘黃）   3. 人物臉部畫法  五官比例：眼睛偏大但不誇張，鼻子小巧，嘴巴簡潔  眉毛與眼神：高度表情力，尤其重視眼神的細節傳達（驚訝、害羞、堅定）  臉部輪廓：線條乾淨圓潤，強調「柔和可親」   4. 動作  自然流暢：動作仿真度高，富有物理重量感  生活細節入鏡：如咀嚼、穿衣、撿東西等，強化角色真實性  誇張適度：表現情緒時會稍微誇大（如跌倒、驚訝表情）   5. 衣服  設計貼近日常：常見款式如圓裙、吊帶褲、襯衫、斗篷等  布料質感具體：皺褶、風中飄動感明顯  色彩搭配樸實自然：符合角色背景（如農村少女穿棉麻色系）   6. 背景畫法  寫實與幻想融合：真實比例空間感＋幻想場景（如漂浮島、精靈森林）  細節極多：植物、屋瓦、街道等都有精緻刻畫  氣氛主導：以光影表現時間感、情緒（如黃昏的橘光、夜晚的靜謐）	gptgip

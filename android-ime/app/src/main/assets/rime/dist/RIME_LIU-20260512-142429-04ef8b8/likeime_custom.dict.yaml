1. 當你聽到感人的故事或情節時，你的情緒反應是？  A. 常常會流淚或感動得很深 B. 偶爾會有所觸動 C. 幾乎不會有特別反應  2. 回想過去的快樂或悲傷時光時，你的記憶如何？  A. 感覺非常清晰，彷彿就在眼前 B. 有時能隱約想起一些片段 C. 幾乎沒有什麼具體記憶  3. 上床後，你通常多久才能入睡？  A. 10分鐘左右，很快就睡著 B. 大約需要半小時左右 C. 至少1小時，甚至更久  4. 閉上眼睛，想像嘴裡含著一片酸檸檬，你的身體反應是？  A. 馬上流口水，酸的感覺非常真實 B. 有一點點酸的感覺，但不強烈 C. 沒有特別感覺  5. 試著想像：手裡拿著鮮紅的蘋果，掉到地上後變成了一根黃色的香蕉。畫面如何？  A. 蘋果和香蕉的畫面都很清楚 B. 兩種水果的畫面有些模糊 C. 完全無法想像，腦海中是一片空白  6. 你對打坐、冥想或白日夢有什麼感覺？  A. 非常喜歡，平時經常進行 B. 偶爾會試試，但不是習慣 C. 完全沒興趣  7. 閉上眼睛，想像自己在溫暖的沙灘上享受陽光，感覺如何？  A. 沙灘的溫暖和海浪聲非常真實 B. 有些模糊，但能隱約感受到氣氛 C. 沒有任何具體的感覺  8. 看著鏡子或照片裡的自己時，你是否曾有過一種陌生的感覺？  A. 常常會覺得，這真的是我嗎？ B. 偶爾會有這樣的感覺 C. 從來沒有過，完全不覺得陌生  9. 伸直雙手於胸前，閉眼想像：左手拿著3公斤重的啞鈴，右手綁著輕氣球。2分鐘後睜眼，雙手高度如何？  A. 左右手的高度差很明顯，像一瓶寶特瓶的高度 B. 高度差有些許，像一個馬克杯的距離 C. 雙手幾乎沒有什麼高度差  10. 想像你最喜歡或嚮往的地方，這個地方讓你感覺如何？  A. 畫面非常清楚，細節生動且感覺真實 B. 畫面有些模糊，但能隱約描述一些細節 C. 無法具體描述或想像，感覺模糊  催眠深度評分方式： 選項： A、4分， B、3分， C、1分，  總分： 0-10分：感官感受性極低，催眠進入深度困難。  11-20分：感官感受性較低，可嘗試輕度催眠。  21-30分：感官感受性中等，能進入中度催眠。  31-40分：感官感受性高，催眠狀態可達深度層次，並能完全沉浸於想像世界。	sprp

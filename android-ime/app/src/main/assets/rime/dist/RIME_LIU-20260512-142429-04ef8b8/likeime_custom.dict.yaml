催眠過程： ①催眠方式：主人會使用輕音樂及言語使用漸進式引導你呼吸及身體放鬆進入舒服的情境，不用藥物； ②身體感覺：你的身體會比平常敏感興奮一倍以上，服從主人的感覺是一種形式和命令可以得到心靈愉悅和快樂； ③調教的地方：約在商旅或汽旅比較安全舒適，過程約2-3h；    調教方式  ① #控射：載上眼罩，繩縛龜甲，然後用按摩棒挑逗乳頭及屌、龜頭責，讓你很爽，除非主人允許才能射精    ② #狗調：載上狗狗頭套、項圈，載上狗狗尾巴溜狗…    ③ #羞辱：使用跳蛋玩肛震動，後踩狗屌，舔吮乳頭，聽你淫叫羞辱你自尊    ④ #傀儡：引導身體全身僵直，無腦無自我意識服從的機器人、感受身體及意識分離體驗。  深度催眠可以體驗斷片或是無手射精依個人催眠感受性…  當然你有喜歡的調教方式也是可以討論看看…	cmfs

①過程：催眠是一個專注放鬆接受引導的過程，輕度上癮的愉悅，安全健康舒適。沒有使用任何外力或藥物。  ②心靈：催眠過程你的頭腦意識都清楚，是健康安全緩解你的焦慮，放鬆你的心情，你心裡會感覺舒適愉快。  ③引導：催眠是藉著專注來引導你內心潛意識去看見或是體驗想做的事情，而你的身體感官比平常更清析敏感及舒服。  ④調教：藉由催眠代入調教情境，狗狗可以感受到平常察覺不到的淫蕩或發現卑賤的自己帶給你身心舒暢。催眠只是讓你專心在自己想做的事情。主人當支配者享受控制一個臣服者的樂趣。  如果你沒有想過是不是想被調教就讓主人引導你，順從心裡的感覺或許你可以發掘內心另一片天地。  如果你不想被調教也完全沒辦法要你做，就當作是一次舒服的放鬆冥想感覺也很好。  ⑤結果：催眠調教是讓原本道德和理智的感覺暫時拋開，盡情享受主人調教給你的愉悅…	cmjs
